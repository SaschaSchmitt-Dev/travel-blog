<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSC Playground</title>
    <link rel="stylesheet" href="./styles/fonts.css" />
    <style>
      .hero {
        background-image: url(./assets/img/index/landing-photo.png);
        background-color: rgb(241, 201, 83);
        width: 1440px;
        height: 515px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .hero img {
        position: absolute;
      }
      .hero_headline {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: "Arima";
        color: #54370d;
        background-image: url(./assets/img/index/landing-photo-cover.svg);
        background-repeat: no-repeat;
        width: 200%;
        height: 100%;
        gap: 32px;
        animation: hero_headline_div 2s forwards;
        animation-delay: 1.5s;
      }

      .hero_headline h1 {
        font-size: 60px;
        line-height: 120%;
        letter-spacing: 0%;
        text-align: center;
        animation: hero_headline_h1 linear 0.5s;
        margin: 0;
      }
      .hero_headline p {
        font-family: "Palanquin";
        font-weight: 500;
        font-style: medium;
        font-size: 28px;
        line-height: 120%;
        letter-spacing: 0%;
        width: 345px;
        height: 227px;
        margin: 0;
        opacity: 0;
        animation: hero_headline_p 400ms forwards;
        animation-delay: 700ms;
      }
      @keyframes hero_headline_h1 {
        0% {
          opacity: 0;
          transform: translateY(150%);
        }
        100% {
          opacity: 1;
          transform: translateY(0%);
        }
      }

      @keyframes hero_headline_p {
        0% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }
      .overlay {
        height: 515px;
        width: 100%;
        animation: hero_animation 3s;
        animation-delay: 2s;
      }
      @keyframes hero_headline_div {
        0% {
          transform: scaleX(300%);
          transform-origin: left;
        }
        100% {
          transform: scaleX(100%);
          transform-origin: left;
        }
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <div class="hero_headline">
        <h1>Cappadocia</h1>
        <p>
          From sunrise balloons to hidden cave dwellings, every moment feels
          unreal in the best way.
        </p>
      </div>
    </div>
  </body>
</html>
