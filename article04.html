<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Blog 02</title>

    <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg">

    <link rel="stylesheet" href="./styles/variables.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/article04.css">

</head>

<body>
    <header class="header">
        <div class="header-navbar">
            <a href="index.html">
                <img src="./assets/icons/logo.png" alt="Blog Logo" /></a>
            <nav class="navbar">
                <ul>
                    <li><a class="highlights-pseudo" href="index.html#highlights">Highlights</a></li>
                    <li><a class="faq-pseudo" href="index.html#faq">FAQ</a></li>
                    <li><a class="contact-pseudo" href="index.html#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="background-mf">
            <img src="./assets/img/article04/mountain-fuji-image.png" alt="Mount Fuji Landscape">
            <img src="./assets/img/article04/mountain-fuji-view.png" alt="Mount Fuji View">
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-content-left">
                <div class="copyright">
                    <img src="./assets/icons/copyright.png" alt="copyright">
                    <p>Travel Blog 2026</p>
                </div>
                <div class="imprint-cookie">
                    <p>Imprint</p>
                    <p>Cookie Preferences</p>
                </div>
            </div>
            <div class="footer-content-right">
                <img src="./assets/icons/tiktok-icon.png" alt="tiktok">
                <img src="./assets/icons/youtube.png" alt="youtube">
                <img src="./assets/icons/facebook.png" alt="facebook">
                <img src="./assets/icons/instagram-logo-2016.png" alt="insta">
            </div>
        </div>
    </footer>

    <nav class="mobile-nav">
        <a href="index.html"><img src="./assets/icons-mobile/home.png" alt="Home"></a>
        <a href="#highlights"><img src="./assets/icons-mobile/rocket-launch.png" alt="Rocket"></a>
        <a href="#faq"><img src="./assets/icons-mobile/live-help.png" alt="FAQ"></a>
        <a href="#contact"><img src="./assets/icons-mobile/person-pin.png" alt="Contact"></a>
    </nav>

</html>
